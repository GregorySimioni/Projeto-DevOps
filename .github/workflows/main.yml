name: Build and Push Docker Image

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./Entrega-DevOps/gradlew

      - name: Run Tests
        working-directory: ./Entrega-DevOps
        run: ./gradlew test


      - name: Build completed successfully
        run: echo "Build completed!"
